<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJudge — ECE Programming Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d10;--surf:#13131a;--card:#1a1a24;--border:#252535;
  --purple:#a78bfa;--pdim:#6d28d9;--green:#34d399;--red:#f87171;
  --amber:#fbbf24;--blue:#60a5fa;--cyan:#22d3ee;
  --text:#ddd8ff;--muted:#5a5a7a;
  --mono:'JetBrains Mono',monospace;--disp:'Syne',sans-serif;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--mono)}
#app{max-width:1100px;margin:0 auto}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.5rem;border-bottom:1px solid var(--border);background:var(--surf);position:sticky;top:0;z-index:100}
.logo{font-family:var(--disp);font-size:1.3rem;font-weight:800;letter-spacing:-.02em;color:#fff;text-decoration:none}
.logo em{color:var(--purple);font-style:normal}
.nav{display:flex;gap:5px}
.nav button{background:transparent;border:1px solid transparent;color:var(--muted);font-family:var(--mono);font-size:.7rem;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .15s}
.nav button.on{border-color:var(--purple);color:var(--purple);background:rgba(167,139,250,.08)}
.nav button:hover:not(.on){color:var(--text);border-color:var(--border)}
.hdr-right{display:flex;align-items:center;gap:8px;font-size:.68rem;color:var(--muted)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 2.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:3px 10px 3px 6px;cursor:pointer;transition:all .15s}
.user-chip:hover{border-color:var(--purple)}
.user-avatar{width:20px;height:20px;border-radius:50%;background:var(--pdim);display:flex;align-items:center;justify-content:center;font-size:.6rem;color:#fff;font-weight:700}
.user-email{font-size:.68rem;color:var(--text);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{background:transparent;border:none;color:var(--muted);font-family:var(--mono);font-size:.68rem;cursor:pointer;padding:0;transition:color .15s}
.logout-btn:hover{color:var(--red)}
.login-btn{background:var(--pdim);border:1px solid var(--purple);color:#fff;font-family:var(--mono);font-size:.7rem;padding:5px 14px;border-radius:20px;cursor:pointer;transition:all .15s}
.login-btn:hover{background:var(--purple)}

/* VIEWS */
.view{display:none;padding:1.5rem 1.5rem 4rem}.view.on{display:block}
.sec-title{font-size:.68rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:1rem}

/* AUTH MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;display:none}
.modal-overlay.on{display:flex}
.modal{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:2rem;width:100%;max-width:400px;position:relative}
.modal-title{font-family:var(--disp);font-size:1.2rem;font-weight:800;color:#fff;margin-bottom:.25rem}
.modal-sub{font-size:.72rem;color:var(--muted);margin-bottom:1.5rem}
.form-group{margin-bottom:1rem}
.form-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;display:block}
.form-input{width:100%;background:#07070e;border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:.78rem;padding:9px 12px;outline:none;transition:border .15s}
.form-input:focus{border-color:var(--purple)}
.form-btn{width:100%;background:var(--pdim);border:1px solid var(--purple);color:#fff;font-family:var(--mono);font-size:.8rem;font-weight:700;padding:11px;border-radius:8px;cursor:pointer;transition:all .15s;margin-top:.5rem}
.form-btn:hover{background:var(--purple)}
.form-btn:disabled{opacity:.5;cursor:not-allowed}
.form-switch{font-size:.72rem;color:var(--muted);text-align:center;margin-top:1rem}
.form-switch a{color:var(--purple);cursor:pointer;text-decoration:none}
.form-switch a:hover{text-decoration:underline}
.form-error{font-size:.72rem;color:var(--red);margin-top:.5rem;display:none}
.form-error.on{display:block}
.form-success{font-size:.72rem;color:var(--green);margin-top:.5rem;display:none}
.form-success.on{display:block}
.modal-close{position:absolute;top:1rem;right:1rem;background:transparent;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;line-height:1}
.modal-close:hover{color:var(--text)}

/* PROBLEM TABLE */
table.pt{width:100%;border-collapse:collapse}
table.pt th{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:7px 12px;border-bottom:1px solid var(--border);text-align:left}
.pr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.pr:hover{background:var(--card)}
.pr td{padding:12px 12px;font-size:.8rem;vertical-align:middle}
.pid{color:var(--muted);font-size:.7rem}
.ptitle{color:var(--text);font-weight:500}
.db{font-size:.63rem;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap}
.e{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.m{background:rgba(251,191,36,.1);color:var(--amber);border:1px solid rgba(251,191,36,.2)}
.h{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.tag{font-size:.62rem;padding:2px 8px;border-radius:10px;background:rgba(167,139,250,.08);color:var(--purple);border:1px solid rgba(167,139,250,.18);margin-right:3px;white-space:nowrap;display:inline-block;margin-bottom:2px}
.acc{color:var(--muted);font-size:.72rem}
.actick{color:var(--green);font-size:1rem}

/* PROBLEM DETAIL */
.back-btn{display:inline-flex;align-items:center;gap:5px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:.7rem;padding:5px 12px;border-radius:7px;cursor:pointer;margin-bottom:1.1rem;transition:all .15s}
.back-btn:hover{border-color:var(--purple);color:var(--purple)}
.prob-header{display:flex;gap:1rem;align-items:flex-start;margin-bottom:1.5rem}
.prob-id-big{font-size:2rem;font-weight:800;font-family:var(--disp);color:var(--purple);line-height:1;min-width:75px}
.prob-title-big{font-size:1.1rem;font-weight:700;font-family:var(--disp);color:#fff;margin-bottom:6px}
.prob-meta{display:flex;gap:7px;flex-wrap:wrap;margin-top:5px;align-items:center}
.mchip{font-size:.65rem;padding:3px 10px;border-radius:20px;border:1px solid var(--border);color:var(--muted)}
.prob-top{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
@media(max-width:700px){.prob-top{grid-template-columns:1fr}}
.prob-desc{background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:1.25rem}
.dlbl{font-size:.65rem;color:var(--purple);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;font-weight:700}
.dtxt{font-size:.78rem;color:#aaa8cc;line-height:1.85}
.io-block{background:#07070e;border:1px solid var(--border);border-radius:7px;padding:.75rem;margin-top:5px;font-size:.72rem;line-height:1.75;white-space:pre;color:var(--green);overflow-x:auto;margin-bottom:.65rem;font-family:var(--mono)}
.dsec{margin-bottom:1.15rem}
.ctabs{display:flex;gap:4px;margin-bottom:.75rem;flex-wrap:wrap}
.ctab{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:.65rem;padding:3px 11px;border-radius:20px;cursor:pointer;transition:all .15s}
.ctab.on{border-color:var(--purple);color:var(--purple);background:rgba(167,139,250,.08)}
.cio{display:none}.cio.on{display:block}
.iolbl{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}

/* EDITOR */
.editor-panel{background:var(--surf);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.editor-titlebar{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1rem;border-bottom:1px solid var(--border);background:var(--card)}
.editor-title{font-size:.72rem;color:var(--muted)}
.editor-lang{font-size:.68rem;color:var(--purple);background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);padding:2px 10px;border-radius:20px}
textarea.code-area{width:100%;height:380px;background:#07070e;border:none;outline:none;color:#c8c6e8;font-family:var(--mono);font-size:.75rem;padding:1rem;resize:vertical;line-height:1.8;tab-size:4}
.vbox{border-radius:9px;padding:12px 15px;font-size:.78rem;display:none;margin:0 0 .75rem}
.vbox.show{display:block}
.vac{background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.3);color:var(--green)}
.vwa{background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.3);color:var(--red)}
.vce{background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.3);color:var(--blue)}
.vrun{background:rgba(167,139,250,.07);border:1px solid rgba(167,139,250,.3);color:var(--purple)}
.vtitle{font-size:.95rem;font-weight:700;margin-bottom:6px}
.vdetail{font-size:.7rem;opacity:.85;line-height:1.65;white-space:pre-wrap;font-family:var(--mono);margin-top:6px}
.vprog{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.vc{width:22px;height:22px;border-radius:4px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.6rem;transition:all .3s}
.vc-pend{background:var(--card)}
.vc-run{background:rgba(167,139,250,.15);border-color:var(--purple);animation:p2 .7s infinite}
.vc-ac{background:rgba(52,211,153,.2);border-color:var(--green);color:var(--green)}
.vc-wa{background:rgba(248,113,113,.2);border-color:var(--red);color:var(--red)}
.vc-ce{background:rgba(96,165,250,.2);border-color:var(--blue);color:var(--blue)}
@keyframes p2{0%,100%{opacity:1}50%{opacity:.3}}
.action-bar{display:flex;gap:.75rem;align-items:center;padding:.85rem 1rem;border-top:1px solid var(--border);background:var(--card)}
.run-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:.73rem;padding:9px 18px;border-radius:8px;cursor:pointer;transition:all .15s;white-space:nowrap}
.run-btn:hover:not(:disabled){border-color:var(--cyan);color:var(--cyan)}
.run-btn:disabled{opacity:.4;cursor:not-allowed}
.sub-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--pdim);border:1px solid var(--purple);color:#fff;font-family:var(--mono);font-size:.8rem;font-weight:700;padding:10px;border-radius:8px;cursor:pointer;letter-spacing:.04em;transition:all .15s}
.sub-btn:hover:not(:disabled){background:var(--purple);transform:translateY(-1px)}
.sub-btn:disabled{opacity:.5;cursor:not-allowed}
.action-hint{font-size:.65rem;color:var(--muted)}

/* SUBMISSIONS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:1.5rem}
.stat-card{background:var(--surf);border:1px solid var(--border);border-radius:9px;padding:1rem 1.25rem}
.stat-val{font-size:1.8rem;font-weight:800;font-family:var(--disp);color:var(--purple)}
.stat-lbl{font-size:.68rem;color:var(--muted);margin-top:3px;letter-spacing:.06em}
.sub-list{display:flex;flex-direction:column;gap:8px}
.sub-row{display:flex;align-items:center;gap:10px;background:var(--surf);border:1px solid var(--border);border-radius:9px;padding:10px 14px;font-size:.75rem}
.sub-row.sac{border-left:3px solid var(--green) !important}
.sub-row.swa{border-left:3px solid var(--red) !important}
.sub-row.sce{border-left:3px solid var(--blue) !important}
.s-status{font-weight:700;min-width:32px;font-size:.7rem}
.sac .s-status{color:var(--green)}.swa .s-status{color:var(--red)}.sce .s-status{color:var(--blue)}
.s-pid{color:var(--muted);min-width:46px;font-size:.68rem}
.s-title{flex:1;color:var(--text)}
.s-meta{color:var(--muted);font-size:.68rem;white-space:nowrap}
.login-wall{background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:2rem;text-align:center;margin-top:1rem}
.login-wall p{font-size:.85rem;color:var(--muted);margin-bottom:1rem}

footer{text-align:center;padding:1.5rem;font-size:.65rem;color:var(--muted);border-top:1px solid var(--border)}
footer a{color:var(--purple);text-decoration:none}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <a class="logo" href="#" onclick="gv('problems');return false;"><em>C</em>Judge</a>
    <div class="nav">
      <button class="on" onclick="gv('problems')">Problems</button>
      <button onclick="gv('submissions')">Submissions</button>
    </div>
    <div class="hdr-right">
      <div class="dot"></div>
      <span style="margin-right:8px">judge online</span>
      <div id="auth-area">
        <button class="login-btn" onclick="showModal('login')">Sign In</button>
      </div>
    </div>
  </div>

  <!-- AUTH MODAL -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modal-login">
        <div class="modal-title">Welcome back</div>
        <div class="modal-sub">Sign in to CJudge</div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" id="login-email" type="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" id="login-password" type="password" placeholder="••••••••">
        </div>
        <div class="form-error" id="login-error"></div>
        <button class="form-btn" id="login-btn" onclick="doLogin()">Sign In</button>
        <div class="form-switch">Don't have an account? <a onclick="showModal('register')">Register</a></div>
      </div>
      <div id="modal-register" style="display:none">
        <div class="modal-title">Create account</div>
        <div class="modal-sub">Join CJudge</div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" id="reg-email" type="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" id="reg-password" type="password" placeholder="At least 6 characters">
        </div>
        <div class="form-error" id="reg-error"></div>
        <div class="form-success" id="reg-success"></div>
        <button class="form-btn" id="reg-btn" onclick="doRegister()">Create Account</button>
        <div class="form-switch">Already have an account? <a onclick="showModal('login')">Sign In</a></div>
      </div>
    </div>
  </div>

  <!-- PROBLEMS -->
  <div id="view-problems" class="view on">
    <p class="sec-title">Problem Set · <span id="prob-count">100</span> problems</p>
    <table class="pt">
      <thead>
        <tr>
          <th style="width:28px"></th>
          <th style="width:78px">ID</th>
          <th>Title</th>
          <th>Tags</th>
          <th style="width:92px">Difficulty</th>
          <th style="width:80px">AC Rate</th>
          <th style="width:72px">Total</th>
        </tr>
      </thead>
      <tbody id="ptbody"></tbody>
    </table>
  </div>

  <!-- DETAIL -->
  <div id="view-detail" class="view">
    <button class="back-btn" onclick="gv('problems')">← back</button>
    <div id="detail-content"></div>
  </div>

  <!-- SUBMISSIONS -->
  <div id="view-submissions" class="view">
    <p class="sec-title">My Submissions</p>
    <div id="submissions-content"></div>
  </div>

  <footer>
    CJudge — ECE Programming Practice ·
    Powered by <a href="https://glot.io" target="_blank">glot.io</a> ·
    <a href="https://github.com/Command1000/ece_programming_midterm_2" target="_blank">Source Repo</a>
  </footer>
</div>

// ── AUTH ──────────────────────────────────
sb.auth.onAuthStateChange((event, session) => {
  currentUser = session?.user || null;
  updateAuthUI();
  if(currentUser) loadMySubmissions();
});

function updateAuthUI(){
  const area = document.getElementById('auth-area');
  if(currentUser){
    const initials = currentUser.email.substring(0,2).toUpperCase();
    area.innerHTML=`
      <div class="user-chip" onclick="gv('submissions')">
        <div class="user-avatar">${initials}</div>
        <span class="user-email">${currentUser.email}</span>
      </div>
      <button class="logout-btn" onclick="doLogout()" style="margin-left:8px">Sign out</button>`;
  } else {
    area.innerHTML=`<button class="login-btn" onclick="showModal('login')">Sign In</button>`;
  }
}

function showModal(type){
  document.getElementById('modal-overlay').classList.add('on');
  document.getElementById('modal-login').style.display = type==='login'?'block':'none';
  document.getElementById('modal-register').style.display = type==='register'?'block':'none';
  document.getElementById('login-error').classList.remove('on');
  document.getElementById('reg-error').classList.remove('on');
  document.getElementById('reg-success').classList.remove('on');
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('on');
}

function closeModalOutside(e){
  if(e.target===document.getElementById('modal-overlay')) closeModal();
}

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-password').value;
  const btn=document.getElementById('login-btn');
  const errEl=document.getElementById('login-error');
  btn.disabled=true; btn.textContent='Signing in...';
  const {error}=await sb.auth.signInWithPassword({email,password});
  btn.disabled=false; btn.textContent='Sign In';
  if(error){
    errEl.textContent=error.message;
    errEl.classList.add('on');
  } else {
    closeModal();
  }
}

async function doRegister(){
  const email=document.getElementById('reg-email').value.trim();
  const password=document.getElementById('reg-password').value;
  const btn=document.getElementById('reg-btn');
  const errEl=document.getElementById('reg-error');
  const sucEl=document.getElementById('reg-success');
  btn.disabled=true; btn.textContent='Creating account...';
  const {error}=await sb.auth.signUp({email,password});
  btn.disabled=false; btn.textContent='Create Account';
  if(error){
    errEl.textContent=error.message;
    errEl.classList.add('on');
  } else {
    sucEl.textContent='✓ Account created! Please check your email to verify.';
    sucEl.classList.add('on');
    errEl.classList.remove('on');
  }
}

async function doLogout(){
  await sb.auth.signOut();
  localSubs=[];
  solvedSet=new Set();
  renderTable();
}

// ── STATS ─────────────────────────────────
async function loadStats(){
  try{
    const res=await fetch(WORKER_URL+'/stats');
    globalStats=await res.json();
    renderTable();
  }catch(e){}
}

function getAcRate(pid){
  const s=globalStats[pid];
  if(!s||s.total===0) return '—';
  return Math.round(s.ac/s.total*100)+'%';
}
function getTotal(pid){
  const s=globalStats[pid];
  if(!s) return '0';
  return s.total.toString();
}

// ── MY SUBMISSIONS ────────────────────────
async function loadMySubmissions(){
  if(!currentUser) return;
  try{
    const res=await fetch(`${WORKER_URL}/my-submissions?user_id=${currentUser.id}`);
    const data=await res.json();
    localSubs=data.map(s=>({pid:s.problem_id,status:s.status,title:s.problem_title,time:new Date(s.created_at).toLocaleTimeString()}));
    solvedSet=new Set(data.filter(s=>s.status==='AC').map(s=>s.problem_id));
    renderSubs();
    renderTable();
  }catch(e){}
}

// ── TABLE ─────────────────────────────────
function renderTable(){
  document.getElementById('prob-count').textContent=Object.keys(PROBLEMS).length;
  document.getElementById('ptbody').innerHTML=Object.values(PROBLEMS).map(p=>`
    <tr class="pr" onclick="openProb('${p.id}')">
      <td>${solvedSet.has(p.id)?'<span class="actick">✓</span>':''}</td>
      <td class="pid">${p.id}</td>
      <td class="ptitle">${p.title}</td>
      <td>${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</td>
      <td><span class="db ${DC[p.diff]}">${p.diff}</span></td>
      <td class="acc">${getAcRate(p.id)}</td>
      <td class="acc">${getTotal(p.id)}</td>
    </tr>`).join('');
}

// ── PROBLEM DETAIL ────────────────────────
function openProb(id){
  const p=PROBLEMS[id];
  const ctabs=p.cases.map((_,i)=>
    `<button class="ctab${i===0?' on':''}" onclick="swCase('${id}',${i})" id="ctab-${id}-${i}">Case ${i+1}</button>`).join('');
  const cios=p.cases.map((c,i)=>`
    <div class="cio${i===0?' on':''}" id="cio-${id}-${i}">
      <div class="iolbl">Input</div>
      <div class="io-block">${esc(c.input)}</div>
      <div class="iolbl">Expected Output</div>
      <div class="io-block">${esc(c.output)}</div>
    </div>`).join('');

  document.getElementById('detail-content').innerHTML=`
    <div class="prob-header">
      <div class="prob-id-big">${p.id}</div>
      <div>
        <div class="prob-title-big">${p.title}</div>
        <div class="prob-meta">
          <span class="db ${DC[p.diff]}">${p.diff}</span>
          <span class="mchip">AC Rate: ${getAcRate(p.id)}</span>
          <span class="mchip">Submissions: ${getTotal(p.id)}</span>
          ${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}
        </div>
      </div>
    </div>
    <div class="prob-top">
      <div class="prob-desc">
        <div class="dsec">
          <div class="dlbl">Problem</div>
          <div class="dtxt">${p.desc.replace(/\n/g,'<br>')}</div>
        </div>
      </div>
      <div class="prob-desc">
        <div class="dsec">
          <div class="dlbl">Sample Cases</div>
          <div class="ctabs">${ctabs}</div>
          ${cios}
        </div>
      </div>
    </div>
    <div id="vbox-${id}" class="vbox"></div>
    <div class="editor-panel">
      <div class="editor-titlebar">
        <span class="editor-title">solution.cpp</span>
        <span class="editor-lang">C++17</span>
      </div>
      <textarea class="code-area" id="code-${id}" spellcheck="false">${BLANK_CODE}</textarea>
      <div class="action-bar">
        <button class="run-btn" id="runbtn-${id}" onclick="runOne('${id}')">▷ Run Case 1</button>
        <button class="sub-btn" id="subbtn-${id}" onclick="submitAll('${id}')">▶ Submit All Cases</button>
        <span class="action-hint">C++17 · glot.io sandbox</span>
      </div>
    </div>`;
  gv('detail');
}

function swCase(pid,idx){
  PROBLEMS[pid].cases.forEach((_,i)=>{
    document.getElementById(`cio-${pid}-${i}`)?.classList.toggle('on',i===idx);
    document.getElementById(`ctab-${pid}-${i}`)?.classList.toggle('on',i===idx);
  });
}

// ── JUDGE ─────────────────────────────────
async function glotRun(code,stdin){
  const res=await fetch(WORKER_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({code,stdin})
  });
  if(!res.ok) throw new Error('Worker error '+res.status);
  return await res.json();
}

async function saveSubmission(pid,title,status){
  if(!currentUser) return;
  await fetch(WORKER_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({save_only:true,problem_id:pid,problem_title:title,status,user_id:currentUser.id})
  });
}

function norm(s){return(s||'').replace(/\r/g,'').trimEnd()}
function setButtons(pid,disabled){
  document.getElementById('subbtn-'+pid).disabled=disabled;
  document.getElementById('runbtn-'+pid).disabled=disabled;
}
function showV(pid,cls,title,extra){
  const v=document.getElementById('vbox-'+pid);
  if(!v) return;
  v.className='vbox show '+cls;
  v.innerHTML=`<div class="vtitle">${title}</div>${extra||''}`;
}

async function runOne(pid){
  const code=document.getElementById('code-'+pid).value;
  const c=PROBLEMS[pid].cases[0];
  setButtons(pid,true);
  showV(pid,'vrun','⏳ Running Case 1...','');
  try{
    const r=await glotRun(code,c.input);
    if(r.stderr&&r.stderr.trim()&&!r.stdout){
      showV(pid,'vce','✗ Compile / Runtime Error',`<div class="vdetail">${esc(r.stderr)}</div>`);
    }else{
      const ok=norm(r.stdout)===norm(c.output);
      showV(pid,ok?'vac':'vwa',ok?'✓ Case 1 Passed':'✗ Case 1 Wrong Answer',
        ok?'':`<div class="vdetail">Got:\n${esc(r.stdout)}\nExpected:\n${esc(c.output)}</div>`);
    }
  }catch(e){showV(pid,'vce','✗ Error',`<div class="vdetail">${esc(e.message)}</div>`);}
  setButtons(pid,false);
}

async function submitAll(pid){
  if(!currentUser){
    showV(pid,'vce','⚠ Please sign in to submit','<div class="vdetail">Click "Sign In" in the top right corner.</div>');
    return;
  }
  const code=document.getElementById('code-'+pid).value;
  const p=PROBLEMS[pid];
  setButtons(pid,true);
  const progHtml=()=>p.cases.map((_,i)=>`<div class="vc vc-pend" id="vc-${pid}-${i}">${i+1}</div>`).join('');
  showV(pid,'vrun','⏳ Judging...',`<div class="vprog">${progHtml()}</div>`);
  let allAc=true,firstBad=null;
  for(let i=0;i<p.cases.length;i++){
    const vcEl=document.getElementById(`vc-${pid}-${i}`);
    if(vcEl){vcEl.className='vc vc-run';vcEl.textContent=i+1;}
    try{
      const r=await glotRun(code,p.cases[i].input);
      const hasErr=r.stderr&&r.stderr.trim()&&!r.stdout;
      if(hasErr){
        allAc=false;
        if(vcEl){vcEl.className='vc vc-ce';vcEl.textContent='C';}
        if(!firstBad) firstBad={type:'ce',msg:r.stderr};
        break;
      }else{
        const ok=norm(r.stdout)===norm(p.cases[i].output);
        if(ok){if(vcEl){vcEl.className='vc vc-ac';vcEl.textContent='✓';}}
        else{
          allAc=false;
          if(vcEl){vcEl.className='vc vc-wa';vcEl.textContent='✗';}
          if(!firstBad) firstBad={type:'wa',got:r.stdout,exp:p.cases[i].output,n:i+1};
        }
      }
    }catch(e){
      allAc=false;
      if(vcEl){vcEl.className='vc vc-ce';vcEl.textContent='E';}
      if(!firstBad) firstBad={type:'err',msg:e.message};
      break;
    }
    if(i<p.cases.length-1) await new Promise(r=>setTimeout(r,450));
  }
  await new Promise(r=>setTimeout(r,200));
  const finalStatus=allAc?'AC':(firstBad?.type==='ce'||firstBad?.type==='err')?'CE':'WA';
  await saveSubmission(pid,p.title,finalStatus);
  await loadStats();
  await loadMySubmissions();

  const vb=document.getElementById('vbox-'+pid);
  const prog=vb?.querySelector('.vprog')?.outerHTML||'';
  let cls,title,detail='';
  if(allAc){
    cls='vac';title=`✓ Accepted — All ${p.cases.length} cases passed!`;
    solvedSet.add(pid);renderTable();
  }else if(firstBad?.type==='ce'||firstBad?.type==='err'){
    cls='vce';title='✗ Compilation Error';
    detail=`<div class="vdetail">${esc(firstBad.msg)}</div>`;
  }else{
    cls='vwa';title=`✗ Wrong Answer on Case ${firstBad.n}`;
    detail=`<div class="vdetail">Got:\n${esc(firstBad.got)}\nExpected:\n${esc(firstBad.exp)}</div>`;
  }
  showV(pid,cls,title,prog+detail);
  setButtons(pid,false);
}

// ── SUBMISSIONS PAGE ──────────────────────
function renderSubs(){
  const content=document.getElementById('submissions-content');
  if(!currentUser){
    content.innerHTML=`
      <div class="login-wall">
        <p>Sign in to view your submission history.</p>
        <button class="login-btn" onclick="showModal('login')">Sign In</button>
      </div>`;
    return;
  }
  const cls={AC:'sac',WA:'swa',CE:'sce'};
  const acCount=localSubs.filter(s=>s.status==='AC').length;
  const waCount=localSubs.filter(s=>s.status==='WA').length;
  const ceCount=localSubs.filter(s=>s.status==='CE').length;
  content.innerHTML=`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${acCount}</div><div class="stat-lbl">ACCEPTED</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--red)">${waCount}</div><div class="stat-lbl">WRONG ANSWER</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--blue)">${ceCount}</div><div class="stat-lbl">COMPILE ERROR</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--amber)">${localSubs.length}</div><div class="stat-lbl">TOTAL</div></div>
    </div>
    <div class="sub-list">
      ${localSubs.length
        ? localSubs.map(s=>`
          <div class="sub-row ${cls[s.status]||''}">
            <span class="s-status">${s.status}</span>
            <span class="s-pid">${s.pid}</span>
            <span class="s-title">${s.title}</span>
            <span class="s-meta">${s.time}</span>
          </div>`).join('')
        : '<p style="color:var(--muted);font-size:.78rem">No submissions yet.</p>'
      }
    </div>`;
}

// ── NAV ───────────────────────────────────
function gv(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById('view-'+name)?.classList.add('on');
  document.querySelectorAll('.nav button').forEach((b,i)=>{
    b.classList.toggle('on',['problems','submissions'][i]===name||(name==='detail'&&i===0));
  });
  if(name==='submissions') renderSubs();
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── INIT ──────────────────────────────────
renderTable();
loadStats();
</script>
